# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - podcast-hosting

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Restore frontend libraries
        working-directory: PodcastsHosting
        run: dotnet tool run libman -- restore --verbosity minimal

      - name: Build with dotnet
        run: dotnet build PodcastsHosting.slnx --configuration Release

      - name: Test with dotnet
        run: dotnet test --solution PodcastsHosting.slnx --configuration Release --no-build --no-restore

      - name: dotnet publish
        if: github.event_name != 'pull_request'
        run: dotnet publish PodcastsHosting/PodcastsHosting.csproj -c Release -o ${{env.DOTNET_ROOT}}/myapp

      - name: Upload artifact for deployment job
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v7

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Run Docker end-to-end tests
        env:
          RUN_DOCKER_E2E_TESTS: 'true'
          DOCKER_E2E_UPLOAD_SIZES_MB: '10,64,128'
          TESTINGPLATFORM_TELEMETRY_OPTOUT: '1'
        run: dotnet test --project PodcastsHosting.EndToEndTests/PodcastsHosting.EndToEndTests.csproj --configuration Release

  deploy:
    runs-on: ubuntu-latest
    needs:
      - build
      - e2e
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v8
        with:
          name: .net-app

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'podcast-hosting'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_250433EF370F4492B1C67B511DB4AA2D }}