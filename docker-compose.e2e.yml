services:
  podcasts-hosting:
    build:
      context: .
      dockerfile: Dockerfile
    mem_limit: 512m
    memswap_limit: 512m
    depends_on:
      sqlserver:
        condition: service_healthy
      azurite:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      App__PublicBaseUrl: http://127.0.0.1:${E2E_APP_PORT}/
      App__RegistrationOpen: "true"
      ConnectionStrings__PodcastsHosting: Server=sqlserver,1433;Database=PodcastsHosting;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;MultipleActiveResultSets=true
      DOTNET_GCHeapHardLimit: "0x18000000"
      Logging__LogLevel__Default: Warning
      Logging__LogLevel__Microsoft_AspNetCore: Warning
      Storage__ConnectionString: DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=${AZURITE_ACCOUNT_KEY};BlobEndpoint=http://azurite:10000/devstoreaccount1;
    ports:
      - "${E2E_APP_PORT}:8080"

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    mem_limit: 1g
    memswap_limit: 1g
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '${MSSQL_SA_PASSWORD}' -C -Q 'SELECT 1' || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P '${MSSQL_SA_PASSWORD}' -Q 'SELECT 1'"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 20s

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    mem_limit: 512m
    memswap_limit: 512m
    environment:
      AZURITE_ACCOUNTS: devstoreaccount1:${AZURITE_ACCOUNT_KEY}
    command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 --skipApiVersionCheck
    ports:
      - "${E2E_AZURITE_PORT}:10000"
    volumes:
      - azurite-data:/data

volumes:
  sqlserver-data:
  azurite-data: